<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProdTrack Lite</title>
  <!-- Dev: Tailwind CDN + custom. Build: dist/app.css has only classes we use (no CDN). -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
  </script>
  <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-[var(--background)] text-[var(--foreground)] min-h-screen">
  <div class="app-wrap no-print">
    <nav id="appNav" class="nav flex-wrap items-center justify-between">
      <div class="flex flex-wrap items-center gap-3">
        <a href="#/" class="nav-brand">ProdTrack Lite</a>
        <a href="#/" class="nav-link">Dashboard</a>
        <a href="#/reports" class="nav-link">Production report</a>
        <a href="#/settings" class="nav-link">Settings &amp; data</a>
      </div>
      <div class="flex flex-wrap items-center gap-2">
        <button type="button" id="logoutBtn" class="rounded-xl border border-gray-300 dark:border-white/20 px-4 py-2.5 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-white/10 transition-colors">Logout</button>
        <button type="button" id="themeToggle" class="rounded-xl border-2 border-violet-200 dark:border-violet-900/50 dark:bg-white/5 px-4 py-2.5 text-base text-gray-700 dark:text-gray-200 hover:bg-violet-50 dark:hover:bg-violet-500/10 focus:ring-2 focus:ring-violet-500 focus:ring-offset-2 transition-colors" title="Toggle dark mode" aria-label="Toggle dark mode">
          <span id="themeIcon">🌙</span>
        </button>
      </div>
    </nav>
    <main id="app"></main>
  </div>
  <script>
    (function() {
      var key = 'prodtrack-theme';
      var dark = localStorage.getItem(key) === 'dark' || (!localStorage.getItem(key) && window.matchMedia('(prefers-color-scheme: dark)').matches);
      function apply() {
        document.documentElement.classList.toggle('dark', dark);
        document.getElementById('themeIcon').textContent = dark ? '☀️' : '🌙';
      }
      apply();
      document.getElementById('themeToggle').addEventListener('click', function() {
        dark = !dark;
        localStorage.setItem(key, dark ? 'dark' : 'light');
        apply();
      });
    })();
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
