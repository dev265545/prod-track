# Build static web + portable folder (PowerShell local server, File System Access API / sql.js), publish ZIP on GitHub Release.

name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  CI: "false"

jobs:
  release-portable:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump version
        id: bump
        run: node .github/scripts/bump-version.js

      - name: Test
        run: npm test

      - name: Build static web (sqlite-file backend + wasm)
        run: npm run build:web-sqlite

      - name: Pack portable/web
        run: npm run pack-portable

      - name: Verify wasm bundled
        run: test -f portable/web/wasm/sql-wasm.wasm

      - name: Zip portable bundle
        id: zip
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          OUT="ProdTrack-portable-${VERSION}.zip"
          zip -r "$OUT" portable \
            -x "portable/web/.DS_Store" \
            -x "**/__MACOSX/**"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"
          ls -la "$OUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: ProdTrack v${{ steps.bump.outputs.version }}
          body: |
            **Portable bundle** — static web app plus the Windows folder in `portable/` (run `Start-ProdTrack.cmd`).

            - Unzip, keep the `portable` folder intact (must include `portable/web/` with `wasm/sql-wasm.wasm`).
            - Uses a local HTTP server and the browser (Chrome or compatible) with File System Access for your `.db` file.

            Built from `${{ github.ref_name }}` @ `${{ github.sha }}`
          files: ${{ steps.zip.outputs.path }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
