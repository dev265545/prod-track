# Build Tauri app and create a GitHub Release on every push to main.
# Auto-bumps version from latest release tag (or package.json) and publishes.
# Windows only.

name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Bump version
        id: bump
        run: node .github/scripts/bump-version.js

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and release (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ steps.bump.outputs.version }}
          releaseName: "ProdTrack v${{ steps.bump.outputs.version }}"
          releaseBody: |
            Built from main @ ${{ github.sha }}
            See the assets below for installers.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
